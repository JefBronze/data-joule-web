      <path d="M 16 17.5 L 14 21 L 18 21 Z" fill="black"/>
    </mask>
    <mask id="teeth-gaps">
      <rect width="32" height="32" fill="white"/>
      <rect x="13.3" y="22.5" width="1.2" height="5" fill="black"/>
      <rect x="16.4" y="22.5" width="1.2" height="5" fill="black"/>
      <rect x="19.5" y="22.5" width="1.2" height="5" fill="black"/>
    </mask>
  </defs>
  <g filter="url(#g)" fill="#fbbf24">
